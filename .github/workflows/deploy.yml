name: Deploy Finance Dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Copy files to container
        run: docker cp app/. finance-dashboard-app-1:/app/

      - name: Install dependencies
        run: docker exec finance-dashboard-app-1 sh -c "cd /app && npm install"

      - name: Build frontend
        run: docker exec finance-dashboard-app-1 sh -c "cd /app && npm run build"

      - name: Restart server
        run: docker restart finance-dashboard-app-1
